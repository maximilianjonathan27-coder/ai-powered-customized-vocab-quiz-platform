<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Portal</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="teacher-body">
  <div class="dashboard">
    <header class="app-header">
      <h1 class="logo">📘 Vocab Teacher</h1>
      <nav class="tabs">
        <button class="tab active" data-tab="sets">📚 Quiz Sets</button>
        <button class="tab" data-tab="publish">📢 Publish</button>
        <button class="tab" data-tab="students">👩‍🎓 Students</button>
        <button class="tab" data-tab="report">📊 Parent Report</button>
        <button class="tab" data-tab="settings">⚙️ Settings</button>
      </nav>
    </header>

    <main class="tab-container">
      <!-- Quiz Sets -->
      <section id="tab-sets" class="tab-panel active">
        <div class="card">
          <h2>Create New Set (Manual)</h2>
          <input type="text" id="set-name-manual" placeholder="Set name" class="full-width">
          <div id="manual-words-container">
            <div class="word-entry">
              <input type="text" placeholder="Word" class="word">
              <input type="text" placeholder="Simple definition" class="def">
              <input type="text" placeholder="3 distractors (comma)" class="dist">
              <textarea placeholder="2-3 example sentences" rows="2"></textarea>
              <input type="text" placeholder="Fill‑blank sentence with (base)" class="fill">
              <input type="text" placeholder="Correct grammatical answer" class="fill-answer">
              <input type="text" placeholder="Detailed dictionary definition" class="detail">
            </div>
          </div>
          <button id="add-word-entry" class="btn-outline">+ Add Word</button>
          <button id="save-manual-set" class="btn">Save Manual Set</button>

          <hr>
          <h2>AI Bulk Generate</h2>
          <input type="text" id="set-name-ai" placeholder="Set name">
          <textarea id="word-list" placeholder="Paste word list (one per line)"></textarea>
          <button id="bulk-gen-btn" class="btn">Generate & Save</button>
          <div id="gen-status" class="status"></div>
        </div>

        <div class="card">
          <h2>Existing Sets</h2>
          <ul id="sets-list" class="list"></ul>
        </div>
      </section>

      <!-- Publish -->
      <section id="tab-publish" class="tab-panel">
        <div class="card">
          <h2>Select Sets to Publish</h2>
          <div id="publish-checkboxes" class="checkbox-list"></div>
          <button id="save-publish" class="btn">Update Published</button>
          <p id="publish-status" class="status-message"></p>
        </div>
      </section>

      <!-- Students Overview -->
      <section id="tab-students" class="tab-panel">
        <div class="card">
          <h2>All Students</h2>
          <table id="students-table">
            <thead><tr><th>Name</th><th>Accuracy</th><th>Time (min)</th><th>Quizzes</th><th>Mastered</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <!-- Parent Report -->
      <section id="tab-report" class="tab-panel">
        <div class="card">
          <h2>Select Student</h2>
          <select id="student-select"><option value="">-- Choose --</option></select>
          <button id="gen-report-btn" class="btn">Generate Report</button>
        </div>
        <div id="report-container" class="report-card" style="display:none;">
          <h2 id="report-name"></h2>
          <div class="metric-cards" id="metric-cards"></div>
          <div class="charts-row">
            <div class="chart-box"><canvas id="trendChart"></canvas></div>
            <div class="chart-box"><canvas id="pieChart"></canvas></div>
          </div>
          <div class="chart-box"><canvas id="masteryBarChart"></canvas></div>
          <div class="advice-box" id="advice-box"></div>
          <div class="report-actions">
            <button id="export-pdf" class="btn">📄 Export PDF</button>
            <button id="copy-link" class="btn">🔗 Copy Share Link</button>
          </div>
        </div>
      </section>

      <!-- Settings -->
      <section id="tab-settings" class="tab-panel">
        <div class="card">
          <h2>API Configuration</h2>
          <label>LLM API Key</label>
          <input type="text" id="api-key-input">
          <button id="save-settings" class="btn">Save</button>
          <p>Generation calls: <span id="gen-count">0</span></p>
        </div>
      </section>
    </main>
  </div>
  <script src="/js/teacher.js"></script>
</body>
</html>
